name: Validate Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-files:
    name: Check Required Files Exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check README.md exists
        run: test -f README.md && echo "README.md exists" || (echo "README.md missing!" && exit 1)

      - name: Check PLAN.md exists
        run: test -f PLAN.md && echo "PLAN.md exists" || (echo "PLAN.md missing!" && exit 1)

      - name: Check CLAUDE.md exists
        run: test -f CLAUDE.md && echo "CLAUDE.md exists" || (echo "CLAUDE.md missing!" && exit 1)

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --config .markdownlint.json || true

  check-achievements:
    name: Verify All Achievements Listed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Pull Shark is in README
        run: grep -q "Pull Shark" README.md && echo "Pull Shark found" || (echo "Pull Shark missing from README!" && exit 1)

      - name: Check YOLO is in README
        run: grep -q "YOLO" README.md && echo "YOLO found" || (echo "YOLO missing from README!" && exit 1)

      - name: Check Quickdraw is in README
        run: grep -q "Quickdraw" README.md && echo "Quickdraw found" || (echo "Quickdraw missing from README!" && exit 1)

      - name: Check Pair Extraordinaire is in README
        run: grep -q "Pair Extraordinaire" README.md && echo "Pair Extraordinaire found" || (echo "Pair Extraordinaire missing from README!" && exit 1)

      - name: Check Starstruck is in README
        run: grep -q "Starstruck" README.md && echo "Starstruck found" || (echo "Starstruck missing from README!" && exit 1)

      - name: Check Galaxy Brain is in README
        run: grep -q "Galaxy Brain" README.md && echo "Galaxy Brain found" || (echo "Galaxy Brain missing from README!" && exit 1)

      - name: Check Public Sponsor is in README
        run: grep -q "Public Sponsor" README.md && echo "Public Sponsor found" || (echo "Public Sponsor missing from README!" && exit 1)

      - name: Check Heart On Your Sleeve is in README
        run: grep -q "Heart On Your Sleeve" README.md && echo "Heart On Your Sleeve found" || (echo "Heart On Your Sleeve missing from README!" && exit 1)

      - name: Check Open Sourcerer is in README
        run: grep -q "Open Sourcerer" README.md && echo "Open Sourcerer found" || (echo "Open Sourcerer missing from README!" && exit 1)

      - name: All achievements verified
        run: echo "All achievements present in README.md"
